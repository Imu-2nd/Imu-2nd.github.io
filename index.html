<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아롱이</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --surface: #ffffff;
      --surface-2: #f1eee8;
      --line: #e5e0d7;
      --text: #23211d;
      --muted: #6f6a61;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --radius-lg: 24px;
      --radius-md: 18px;
      --max: 1160px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.65;
    }

    img, video {
      display: block;
      max-width: 100%;
    }

    .container {
      width: min(calc(100% - 40px), var(--max));
      margin: 0 auto;
    }

    .hero {
      padding: 72px 0 36px;
    }

    .hero-inner {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 32px;
      padding: 56px 32px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 56px);
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .hero-subtitle {
      margin: 14px auto 0;
      color: var(--muted);
      font-size: 16px;
    }

    .hero-actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 13px 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: background .2s ease, transform .2s ease;
    }

    .btn:hover {
      background: var(--surface-2);
      transform: translateY(-1px);
    }

    main {
      padding-bottom: 56px;
    }

    section {
      margin-top: 20px;
    }

    .section-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .section-head {
      margin-bottom: 20px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.02em;
      font-weight: 700;
    }

    .section-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .video-card,
    .photo-card {
      overflow: hidden;
      border-radius: var(--radius-md);
      background: var(--surface-2);
      border: 1px solid var(--line);
    }

    .video-card video {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #ddd7ce;
    }

    .gallery {
      columns: 4 220px;
      column-gap: 16px;
    }

    .gallery .photo-card {
      margin: 0 0 16px;
      break-inside: avoid;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .gallery .photo-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.08);
    }

    .gallery .photo-card img {
      width: 100%;
      height: auto;
    }

    footer {
      padding: 10px 0 36px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(26, 24, 20, 0.88);
      z-index: 50;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-inner {
      position: relative;
      width: min(96vw, 1200px);
      max-height: 92vh;
      background: #111;
      border-radius: 24px;
      overflow: hidden;
    }

    .lightbox-media {
      width: 100%;
      max-height: 92vh;
      object-fit: contain;
      background: #111;
    }

    .close-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      z-index: 2;
    }

    @media (max-width: 900px) {
      .container {
        width: min(calc(100% - 24px), var(--max));
      }

      .hero {
        padding-top: 32px;
      }

      .hero-inner,
      .section-card {
        padding: 22px;
        border-radius: 24px;
      }

      .video-grid {
        grid-template-columns: 1fr;
      }

      .gallery {
        columns: 2 180px;
      }
    }

    @media (max-width: 560px) {
      .gallery {
        columns: 1;
      }

      .hero-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="container">
      <div class="hero-inner">
        <h1 id="heroTitle">아롱이</h1>
        <p class="hero-subtitle" id="heroSubtitle">달나라로 간 아롱이와의 추억!!!</p>
        <div class="hero-actions">
          <a class="btn" href="#videoSection">영상</a>
          <a class="btn" href="#gallerySection">사진</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="videoSection">
      <div class="section-card">
        <div class="section-head">
          <h2>영상</h2>
        </div>
        <div class="video-grid" id="videoGrid"></div>
      </div>
    </section>

    <section id="gallerySection">
      <div class="section-card">
        <div class="section-head">
          <h2>사진</h2>
        </div>
        <div class="gallery" id="gallery"></div>
      </div>
    </section>
  </main>

  <footer>
    아롱이 사진 기록
  </footer>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-inner">
      <button class="close-btn" id="closeLightbox" aria-label="닫기">×</button>
      <div id="lightboxContent"></div>
    </div>
  </div>

  <script>
    const memorial = {
      name: "아롱이",
      assetBasePath: "./",
      title: "아롱이",
      subtitle: "달나라로 간 아롱이와의 추억"
    };

    const videos = [
      "KakaoTalk_20260317_191720432.mp4",
      "KakaoTalk_20260317_191727111.mp4"
    ];

    const photos = [
      "KakaoTalk_20260317_191722475.jpg",
      "KakaoTalk_20260317_191722475_01.jpg",
      "KakaoTalk_20260317_191722475_02.jpg",
      "KakaoTalk_20260317_191722475_03.jpg",
      "KakaoTalk_20260317_191722475_04.jpg",
      "KakaoTalk_20260317_191722475_05.jpg",
      "KakaoTalk_20260317_191722475_06.jpg",
      "KakaoTalk_20260317_191722475_07.jpg",
      "KakaoTalk_20260317_191722475_08.jpg",
      "KakaoTalk_20260317_191722475_09.jpg",
      "KakaoTalk_20260317_191722475_10.jpg",
      "KakaoTalk_20260317_191722475_11.jpg",
      "KakaoTalk_20260317_191722475_12.jpg",
      "KakaoTalk_20260317_191722475_13.jpg",
      "KakaoTalk_20260317_191722475_14.jpg",
      "KakaoTalk_20260317_191722475_15.jpg",
      "KakaoTalk_20260317_191722475_16.jpg",
      "KakaoTalk_20260317_191722475_17.jpg",
      "KakaoTalk_20260317_191722475_18.jpg",
      "KakaoTalk_20260317_191722475_19.jpg",
      "KakaoTalk_20260317_191722475_20.jpg",
      "KakaoTalk_20260317_191722475_21.jpg",
      "KakaoTalk_20260317_191722475_22.jpg",
      "KakaoTalk_20260317_191722475_23.jpg",
      "KakaoTalk_20260317_191722475_24.jpg",
      "KakaoTalk_20260317_191722475_25.jpg"
    ];

    const titleEl = document.getElementById("heroTitle");
    const subtitleEl = document.getElementById("heroSubtitle");
    const videoGrid = document.getElementById("videoGrid");
    const gallery = document.getElementById("gallery");
    const lightbox = document.getElementById("lightbox");
    const lightboxContent = document.getElementById("lightboxContent");
    const closeLightbox = document.getElementById("closeLightbox");

    titleEl.textContent = memorial.title;
    subtitleEl.textContent = memorial.subtitle;

    function assetUrl(fileName) {
      return encodeURI(`${memorial.assetBasePath}${fileName}`);
    }

    videos.forEach((file) => {
      const card = document.createElement("article");
      card.className = "video-card";

      const video = document.createElement("video");
      video.src = assetUrl(file);
      video.controls = true;
      video.preload = "metadata";
      video.playsInline = true;
      video.onerror = () => card.remove();

      card.appendChild(video);
      videoGrid.appendChild(card);
    });

    photos.forEach((file, index) => {
      const card = document.createElement("article");
      card.className = "photo-card";
      card.tabIndex = 0;
      card.setAttribute("role", "button");
      card.setAttribute("aria-label", `${memorial.name} 사진 ${index + 1} 크게 보기`);

      const img = document.createElement("img");
      img.src = assetUrl(file);
      img.alt = `${memorial.name} 사진 ${index + 1}`;
      img.loading = "lazy";
      img.decoding = "async";
      img.onerror = () => card.remove();

      const open = () => openLightbox(assetUrl(file), `${memorial.name} 사진 ${index + 1}`);
      card.addEventListener("click", open);
      card.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          open();
        }
      });

      card.appendChild(img);
      gallery.appendChild(card);
    });

    function openLightbox(src, alt = "") {
      lightboxContent.innerHTML = "";
      const img = document.createElement("img");
      img.src = src;
      img.alt = alt;
      img.className = "lightbox-media";
      lightboxContent.appendChild(img);
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeBox() {
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxContent.innerHTML = "";
      document.body.style.overflow = "";
    }

    closeLightbox.addEventListener("click", closeBox);
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeBox();
    });
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeBox();
    });
  </script>
</body>
</html>
